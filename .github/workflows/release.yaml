on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch: x86_64-linux
            runner: ubuntu-latest
          - arch: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: haras
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: |
          nix build --show-trace '.#unwrapped'
          mkdir -p release
          cp -L result/bin/cryl release/cryl-${{ matrix.arch }}
          tar -czf cryl-${{ matrix.arch }}.tar.gz -C release cryl-${{ matrix.arch }}
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" cryl-${{ matrix.arch }}.tar.gz --clobber
