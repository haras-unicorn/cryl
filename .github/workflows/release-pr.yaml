jobs:
  release-pr:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: googleapis/release-please-action@v4
        with:
          command: manifest
          config-file: .release-please-config.json
          default-branch: main
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
on:
  workflow_dispatch: {}
  push:
    branches:
      - main
